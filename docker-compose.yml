services:
  app:
    build:
      context: .
      target: production
    ports:
      - "8000:8000"
    volumes:
      - drc-data:/app/data
    environment:
      - DRC_DATA_DIR=/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  drc-data:
